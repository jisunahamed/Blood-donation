<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Blood Donation Platform — Find blood donors, save lives. Connect with verified donors in your area." />
  <title>LifeFlow — Blood Donation Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/landing-dark.css" />
</head>
<body>
  <!-- Toast Container -->
  <div id="toast-container"></div>

  <!-- Spinner Overlay -->
  <div id="spinner-overlay" class="spinner-overlay hidden">
    <div class="spinner">
      <div class="spinner-drop"></div>
      <span>Loading…</span>
    </div>
  </div>

  <!-- Modal Overlay -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-content" class="modal"></div>
  </div>

  <!-- Navigation -->
  <nav id="main-nav" class="navbar">
    <div class="nav-brand" style="display:flex; align-items:center; gap: 0.5rem;">
      <svg class="nav-logo" viewBox="0 0 40 40" width="36" height="36">
        <defs>
          <linearGradient id="drop-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#E74C3C"/>
            <stop offset="100%" stop-color="#C0392B"/>
          </linearGradient>
        </defs>
        <path d="M20 4 C20 4 6 20 6 27 C6 34 12.3 38 20 38 C27.7 38 34 34 34 27 C34 20 20 4 20 4Z" fill="url(#drop-grad)"/>
        <path d="M16 24 L18 26 L24 20" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div style="display:flex; flex-direction:column; line-height:1;">
        <span class="nav-title" style="font-family: 'Hind Siliguri', sans-serif;">রক্তসেতু</span>
        <span class="nav-subtitle">এক ফোঁটা রক্ত, বাঁচাতে পারে হাজার প্রাণ</span>
      </div>
    </div>
    <button id="hamburger-btn" class="hamburger hidden" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <div id="nav-links" class="nav-links">
      <!-- Dynamically rendered -->
    </div>
  </nav>

  <!-- Main App Container -->
  <main id="app"></main>

  <!-- Bottom Navigation (Mobile) -->
  <nav id="bottom-nav" style="display:none;">
    <div class="bnav-inner" id="bnav-inner">
      <!-- Dynamically rendered based on auth state -->
    </div>
  </nav>

  <!-- Supabase JS (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <!-- App Scripts -->
  <script src="js/supabase-client.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/donors.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/router.js"></script>
  <script
    src="https://chatbot.inmetech.com/widget.js"
    data-agent-id="763bb98e-591a-4679-800c-fe855b09a4ad"
    data-api-key="63bcf35c-9c27-4bb8-8f82-8680ae2ae85e"
  ></script>
</body>
</html>
